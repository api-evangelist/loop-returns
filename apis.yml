apis:
  - aid: loop-returns:loop-returns-api
    name: Loop Returns API
    description: >-
      REST API for managing returns and exchanges, including creating return
      authorizations, retrieving return data, processing returns, managing
      carts, destinations, allowlists/blocklists, label requests, item grading,
      and programmatic webhook management. Supports both API key and OAuth 2.0
      authentication.
