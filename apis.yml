aid: loop-returns
name: Loop Returns
description: >-
  Loop Returns is an AI-powered post-purchase operations platform built for
  e-commerce retention that unites tracking, returns, exchanges, fraud
  prevention, and shipping into a single platform. Originally built for Shopify,
  Loop now supports all e-commerce platforms and enables brands to transform
  returns into revenue-retaining exchanges. The platform provides a REST API for
  creating return authorizations, tracking return status, managing exchange
  workflows, generating labels, and triggering refunds. Developers can also
  configure programmatic webhooks to receive real-time event notifications for
  returns, shipments, labels, and gift cards. API access is gated by scoped API
  keys passed via the X-Authorization header, with OAuth 2.0 required for the
  Label and Webhooks APIs.
